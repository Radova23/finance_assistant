<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FinanceAI Assistant</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #10b981; --green-dark: #059669;
      --bg: #0a0c10; --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08); --text: #e2e8f0; --muted: #6b7280;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
    .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
    .app::before { content: ''; position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; background: radial-gradient(ellipse, rgba(16,185,129,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); background: rgba(10,12,16,0.97); backdrop-filter: blur(20px); z-index: 10; flex-shrink: 0; }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--green), var(--green-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(16,185,129,0.35); flex-shrink: 0; }
    .header-text h1 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #f0f2f8; }
    .header-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 5px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.22); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--green); font-weight: 500; }
    .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)} }

    /* Google Sheet Panel */
    .sheet-panel { padding: 12px 16px; background: rgba(16,185,129,0.04); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 5; }
    .sheet-label { font-size: 11px; color: var(--muted); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
    .sheet-label svg { flex-shrink: 0; }
    .sheet-row { display: flex; gap: 8px; align-items: center; }
    .sheet-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color .2s; min-width: 0; }
    .sheet-input:focus { border-color: rgba(16,185,129,.4); }
    .sheet-input::placeholder { color: #374151; }
    .sheet-btn { flex-shrink: 0; background: linear-gradient(135deg, var(--green), var(--green-dark)); border: none; border-radius: 10px; padding: 8px 14px; color: white; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all .2s; box-shadow: 0 0 12px rgba(16,185,129,.25); -webkit-tap-highlight-color: transparent; }
    .sheet-btn:active { transform: scale(.95); }
    .sheet-status { margin-top: 7px; font-size: 12px; display: none; align-items: center; gap: 5px; }
    .sheet-status.ok { color: var(--green); display: flex; }
    .sheet-status.err { color: #f87171; display: flex; }
    .sheet-status.loading { color: var(--muted); display: flex; }

    /* Chips */
    .chips { display: flex; gap: 7px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; background: rgba(10,12,16,0.9); z-index: 5; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 13px; font-size: 12px; color: #9ca3af; cursor: pointer; transition: all .2s; white-space: nowrap; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    .chip:active, .chip:hover { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.35); color: var(--green); }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px; display: flex; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    .row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp .25s ease; }
    .row.user { flex-direction: row-reverse; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .avatar { width: 28px; height: 28px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .avatar.ai { background: linear-gradient(135deg, var(--green), var(--green-dark)); box-shadow: 0 0 12px rgba(16,185,129,.3); }
    .avatar.usr { background: rgba(255,255,255,.08); }
    .bubble { max-width: 78%; padding: 11px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
    .bubble.ai { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
    .bubble.user { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: white; border-bottom-right-radius: 4px; }
    .typing { display: flex; align-items: center; gap: 4px; padding: 2px 0; }
    .typing span { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: bounce 1.1s ease-in-out infinite; }
    .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1} }
    .bubble .h2 { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#f0f2f8; margin-bottom:3px; }
    .bubble .h3 { font-family:'Syne',sans-serif; font-size:13px; font-weight:600; color:#d1fae5; margin-top:6px; }
    .bubble .li { padding-left:4px; color:#d1d5db; }
    .bubble .sp { height:5px; }
    .bubble p { margin:0; }

    /* Link card inside bubble */
    .link-card { display: flex; align-items: center; gap: 10px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 10px; padding: 10px 12px; margin-top: 10px; text-decoration: none; color: var(--green); font-size: 13px; font-weight: 500; transition: background .2s; }
    .link-card:hover { background: rgba(16,185,129,0.18); }

    /* Input */
    .input-area { padding: 10px 14px calc(10px + var(--safe-bottom)); background: rgba(10,12,16,0.98); border-top: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
    .input-wrap { display: flex; align-items: flex-end; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 8px 8px 8px 14px; transition: border-color .2s; }
    .input-wrap:focus-within { border-color: rgba(16,185,129,.4); background: rgba(16,185,129,.03); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; max-height: 120px; line-height: 1.55; padding: 2px 0; }
    textarea::placeholder { color: #374151; }
    .send { width: 36px; height: 36px; background: linear-gradient(135deg, var(--green), var(--green-dark)); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 14px rgba(16,185,129,.3); transition: all .2s; -webkit-tap-highlight-color: transparent; }
    .send:active { transform: scale(.93); }
    .send:disabled { opacity:.3; cursor:not-allowed; transform:none; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="header-text">
      <h1>FinanceAI</h1>
      <p>P&amp;L · Cash Flow · Balance Sheet</p>
    </div>
    <div class="status"><div class="dot"></div>Онлайн</div>
  </div>

  <!-- Google Sheet Panel -->
  <div class="sheet-panel">
    <div class="sheet-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/><polyline points="14 2 14 8 20 8" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/></svg>
      Google таблица для анализа
    </div>
    <div class="sheet-row">
      <input class="sheet-input" id="sheetUrl" type="url" placeholder="Вставьте ссылку на Google таблицу..." />
      <button class="sheet-btn" id="loadBtn" onclick="loadSheet()">Загрузить</button>
    </div>
    <div class="sheet-status" id="sheetStatus"></div>
  </div>

  <!-- Quick chips -->
  <div class="chips" id="chips"></div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inp" rows="1" placeholder="Напишите задачу или вопрос..."></textarea>
      <button class="send" id="sendBtn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0c10'); tg.setBackgroundColor('#0a0c10'); }

  // State
  let sheetData = null;
  let sheetUrl = '';
  let history = [];
  let loading = false;

  const CHIPS = [
    "Посчитай P&L",
    "Анализ Cash Flow",
    "Сделай баланс",
    "Календарь платежей",
    "Лимиты остатков",
    "Создай отчёт в Google таблице",
  ];

  // Build SYSTEM prompt dynamically
  function buildSystem() {
    let base = `Ты — профессиональный финансовый ИИ-ассистент. Ты помогаешь пользователю анализировать бизнес-данные и строить финансовые отчёты.

Твои возможности:
1. Анализировать данные из Google таблицы пользователя
2. Считать P&L (Profit & Loss): выручка, расходы, EBITDA, чистая прибыль
3. Строить Cash Flow: операционный, инвестиционный, финансовый
4. Составлять Balance Sheet: активы, пассивы, капитал
5. Создавать календарь платежей
6. Считать лимиты остатков (форпом и другие)
7. Давать рекомендации на основе данных

Когда пользователь просит создать новую Google таблицу с результатами:
- Опиши структуру таблицы, которую нужно создать
- Скажи что для автоматического создания нужен Google Apps Script или сервер с Google API
- Предоставь готовый Google Apps Script код который пользователь может запустить сам
- Или предложи экспортировать данные в CSV

Всегда отвечай на том языке на котором пишет пользователь.
Используй ** для выделения важного, ## для заголовков.`;

    if (sheetData) {
      base += `\n\n--- ДАННЫЕ ИЗ GOOGLE ТАБЛИЦЫ ПОЛЬЗОВАТЕЛЯ ---\n${sheetData}\n--- КОНЕЦ ДАННЫХ ---\n\nАнализируй эти данные при ответах на вопросы пользователя.`;
    }
    return base;
  }

  // Render chips
  const chipsEl = document.getElementById('chips');
  CHIPS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = text;
    btn.onclick = () => send(text);
    chipsEl.appendChild(btn);
  });

  // Welcome message
  addMessage('assistant', 'Привет! Я ваш финансовый ИИ-ассистент 👋\n\n**Что я умею:**\n- Анализировать ваши данные из Google таблицы\n- Считать P&L, Cash Flow, Balance Sheet\n- Строить календарь платежей\n- Считать лимиты остатков\n- Создавать новые таблицы с результатами\n\nВставьте ссылку на вашу Google таблицу выше, или просто напишите задачу — я помогу!');

  // Load Google Sheet via public CSV export
  async function loadSheet() {
    const url = document.getElementById('sheetUrl').value.trim();
    if (!url) return;
    sheetUrl = url;

    const statusEl = document.getElementById('sheetStatus');
    const loadBtn = document.getElementById('loadBtn');
    statusEl.className = 'sheet-status loading';
    statusEl.innerHTML = '⏳ Загружаю данные...';
    loadBtn.disabled = true;

    try {
      // Extract spreadsheet ID
      const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (!match) throw new Error('Не удалось определить ID таблицы. Проверьте ссылку.');

      const sheetId = match[1];
      // Try to get first sheet as CSV (table must be published or shared as "anyone with link can view")
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&id=${sheetId}`;
      const resp = await fetch(csvUrl);
      if (!resp.ok) throw new Error('Нет доступа. Убедитесь что таблица открыта по ссылке (Общий доступ → Все кто имеют ссылку).');

      const csv = await resp.text();
      if (!csv || csv.includes('<!DOCTYPE')) throw new Error('Нет доступа к таблице.');

      sheetData = csv;
      statusEl.className = 'sheet-status ok';
      statusEl.innerHTML = '✅ Таблица загружена — можно задавать вопросы!';

      addMessage('assistant', `**Таблица загружена успешно!** ✅\n\nЯ вижу ваши данные. Что нужно сделать?\n- Посчитать P&L?\n- Построить Cash Flow?\n- Сделать баланс?\n- Создать календарь платежей?\n\nПросто напишите задачу!`);
    } catch (e) {
      statusEl.className = 'sheet-status err';
      statusEl.innerHTML = '❌ ' + e.message;
    }
    loadBtn.disabled = false;
  }

  // Input handlers
  const inp = document.getElementById('inp');
  const sendBtn = document.getElementById('sendBtn');

  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
    sendBtn.disabled = !inp.value.trim() || loading;
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  sendBtn.onclick = () => send();

  function send(text) {
    const msg = text || inp.value.trim();
    if (!msg || loading) return;
    inp.value = ''; inp.style.height = 'auto'; sendBtn.disabled = true;
    doSend(msg);
  }

  function addMessage(role, content, isLoading = false) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'row ' + (role === 'user' ? 'user' : 'ai');

    const av = document.createElement('div');
    av.className = 'avatar ' + (role === 'user' ? 'usr' : 'ai');
    av.innerHTML = role === 'user'
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="white" stroke-width="2"/></svg>`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    const bub = document.createElement('div');
    bub.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
    if (isLoading) {
      bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      bub.innerHTML = renderContent(content);
    }

    row.appendChild(av); row.appendChild(bub);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bub;
  }

  function renderContent(text) {
    const lines = text.split('\n');
    return lines.map(line => {
      if (line.startsWith('## ') || line.startsWith('# ')) return `<p class="h2">${inlineBold(line.replace(/^#+\s/, ''))}</p>`;
      if (line.startsWith('### ')) return `<p class="h3">${inlineBold(line.slice(4))}</p>`;
      if (line.startsWith('- ') || line.startsWith('• ')) return `<p class="li">• ${inlineBold(line.slice(2))}</p>`;
      if (/^\d+\.\s/.test(line)) return `<p class="li">${inlineBold(line)}</p>`;
      if (!line.trim()) return '<div class="sp"></div>';
      // Detect links
      const linkMatch = line.match(/https?:\/\/[^\s]+/);
      if (linkMatch) {
        const linkUrl = linkMatch[0];
        const before = line.slice(0, linkMatch.index);
        const after = line.slice(linkMatch.index + linkUrl.length);
        const isSheet = linkUrl.includes('docs.google.com');
        return `<p>${inlineBold(before)}</p><a class="link-card" href="${linkUrl}" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="15 3 21 3 21 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>${isSheet ? '📊 Открыть Google таблицу' : '🔗 Открыть ссылку'}</a><p>${inlineBold(after)}</p>`;
      }
      return `<p>${inlineBold(line)}</p>`;
    }).join('');
  }

  function inlineBold(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  }

  async function doSend(msg) {
    loading = true;
    addMessage('user', msg);
    history.push({ role: 'user', content: msg });
    const loadingBub = addMessage('assistant', '', true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: buildSystem(),
          messages: history,
        })
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text || '').join('\n') || 'Ошибка ответа.';
      loadingBub.innerHTML = renderContent(reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      loadingBub.innerHTML = renderContent('Ошибка соединения. Попробуйте ещё раз.');
    }

    loading = false;
    sendBtn.disabled = !inp.value.trim();
    document.getElementById('messages').scrollTop = 9999;
  }
</script>
</body>
</html>
